name: Manual Build Sakana

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: manual-build-sakana-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build html/sakana.min.js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build dependencies
        run: |
          npm install --no-save --no-package-lock --no-audit --no-fund clean-css@5.3.1 uglify-es@3.3.9 less@4.2.0

      - name: Build sakana.min.js
        shell: bash
        run: |
          cat > .sakana-build-auto.cjs <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const crypto = require('crypto');
          const childProcess = require('child_process');
          const less = require('less');
          const CleanCSS = require('clean-css');
          const UglifyJS = require('uglify-es');

          const rootDir = process.cwd();
          const htmlDir = path.join(rootDir, 'html');

          const sakanaJsPath = path.join(htmlDir, 'sakana.js');
          const sakanaLessPath = path.join(htmlDir, 'sakana.less');
          const sakanaMinJsPath = path.join(htmlDir, 'sakana.min.js');

          const excludedPngNames = new Set([
            'takina.png',
            'chisato.png',
            'blue00f4.png'
          ]);

          const assetMimeTypes = {
            '.png': 'image/png',
            '.m4a': 'audio/x-m4a',
            '.mp3': 'audio/mpeg'
          };

          const uglifyOptions = {
            parse: {},
            compress: {
              drop_console: false
            },
            mangle: {},
            output: {
              comments: false
            },
            sourceMap: false,
            ecma: 8,
            keep_fnames: false,
            keep_classnames: false,
            toplevel: false,
            warnings: false
          };

          function assertFileExists(filePath) {
            if (!fs.existsSync(filePath)) {
              throw new Error(`文件不存在: ${filePath}`);
            }
          }

          function md5(content) {
            return crypto.createHash('md5').update(content).digest('hex');
          }

          function escapeRegExp(value) {
            return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          }

          function escapeLessString(value) {
            return String(value)
              .replace(/\\/g, '/')
              .replace(/"/g, '\\"');
          }

          function getMimeType(fileName) {
            const ext = path.extname(fileName).toLowerCase();
            const mimeType = assetMimeTypes[ext];

            if (!mimeType) {
              throw new Error(`不支持的资源类型: ${fileName}`);
            }

            return mimeType;
          }

          function getHtmlFiles() {
            if (!fs.existsSync(htmlDir)) {
              throw new Error('缺少 html 目录');
            }

            return fs.readdirSync(htmlDir, {
              withFileTypes: true
            }).filter((item) => item.isFile()).map((item) => item.name);
          }

          function getGitLastChangedTimestamp(fileName) {
            const relativePath = `html/${fileName}`;

            try {
              const output = childProcess
                .execSync(`git log -1 --format=%ct -- "${relativePath}"`, {
                  cwd: rootDir,
                  encoding: 'utf8',
                  stdio: ['ignore', 'pipe', 'ignore']
                })
                .trim();

              const timestamp = Number(output);

              if (Number.isFinite(timestamp) && timestamp > 0) {
                return timestamp;
              }
            } catch (error) {
              // ignore
            }

            return 0;
          }

          function getCustomCharacters() {
            const files = getHtmlFiles();

            return files
              .filter((fileName) => path.extname(fileName).toLowerCase() === '.png')
              .filter((fileName) => !excludedPngNames.has(fileName.toLowerCase()))
              .map((fileName) => {
                const characterName = path.basename(fileName, path.extname(fileName));

                if (!/^[A-Za-z0-9_-]+$/.test(characterName)) {
                  throw new Error(
                    `非法角色图片文件名: ${fileName}\n` +
                    `文件名只能使用英文字母、数字、下划线、中划线。\n` +
                    `例如: WGFunina.png、miku.png、role_01.png`
                  );
                }

                return {
                  name: characterName,
                  image: fileName,
                  changedAt: getGitLastChangedTimestamp(fileName),
                  state: {
                    r: 1,
                    y: 40,
                    t: 0,
                    w: 0,
                    d: 0.99
                  }
                };
              })
              .sort((a, b) => a.name.localeCompare(b.name, 'en'));
          }

          function getLatestDefaultCharacter(customCharacters) {
            if (customCharacters.length === 0) {
              return 'takina';
            }

            const sorted = [...customCharacters].sort((a, b) => {
              if (b.changedAt !== a.changedAt) {
                return b.changedAt - a.changedAt;
              }

              return b.name.localeCompare(a.name, 'en');
            });

            return sorted[0].name;
          }

          function injectCharactersToJs(sourceCode, characters, defaultCharacter) {
            let code = sourceCode;

            const audioMarker = '// 音效';
            const audioMarkerIndex = code.indexOf(audioMarker);

            if (audioMarkerIndex === -1) {
              throw new Error('无法定位 html/sakana.js 中的 // 音效 标记');
            }

            const beforeAudioMarker = code.slice(0, audioMarkerIndex);
            const charactersCloseIndex = beforeAudioMarker.lastIndexOf('};');

            if (charactersCloseIndex === -1) {
              throw new Error('无法定位 html/sakana.js 中的 Characters 结束位置');
            }

            if (characters.length > 0) {
              const characterBlocks = characters.map((character) => {
                const state = character.state;

                return [
                  `  ${JSON.stringify(character.name)}: {`,
                  `    r: ${state.r},`,
                  `    y: ${state.y},`,
                  `    t: ${state.t},`,
                  `    w: ${state.w},`,
                  `    d: ${state.d}`,
                  `  }`
                ].join('\n');
              }).join(',\n');

              code =
                code.slice(0, charactersCloseIndex) +
                ',\n' +
                characterBlocks +
                '\n' +
                code.slice(charactersCloseIndex);
            }

            // 把源码默认角色 takina 替换为最新自定义角色。
            code = code.replace(
              /character\s*=\s*['"]takina['"]/,
              `character = ${JSON.stringify(defaultCharacter)}`
            );

            // 允许切换所有角色，而不是只在 chisato/takina 之间切换。
            const switchStartText = 'const switchCharacter = v=>{';
            const switchStartIndex = code.indexOf(switchStartText);

            if (switchStartIndex === -1) {
              throw new Error('无法定位 switchCharacter 函数');
            }

            const canSwitchMarker = 'if(canSwitchCharacter)';
            const canSwitchIndex = code.indexOf(canSwitchMarker, switchStartIndex);

            if (canSwitchIndex === -1) {
              throw new Error('无法定位 if(canSwitchCharacter)');
            }

            const newSwitchCharacterCode = [
              'const switchCharacter = _=>{',
              '      const characterNames = Object.keys(Characters);',
              '      const currentIndex = characterNames.indexOf(character);',
              '      const nextIndex = currentIndex === -1 ? 0 : (currentIndex + 1) % characterNames.length;',
              '      character = characterNames[nextIndex];',
              '      setCharacter(character);',
              '      onSwitchCharacter(character);',
              '    };',
              '    '
            ].join('\n');

            code =
              code.slice(0, switchStartIndex) +
              newSwitchCharacterCode +
              code.slice(canSwitchIndex);

            // 修复原源码小问题：设置 y 时不应该判断 r。
            code = code.replace('if(r) v.y = y;', 'if(y) v.y = y;');

            // 默认杆子颜色参数改成金色发光模式。
            code = code.replace(
              /strokeStyle\s*=\s*['"]#182562['"]/,
              `strokeStyle = 'gold-glow'`
            );

            // 给 canvas 杆子增加金黄色渐变发光特效。
            const originalStrokeCode = 'ctx.strokeStyle = strokeStyle; ctx.lineWidth = 10;';
            const goldGlowStrokeCode = [
              `if(strokeStyle === 'gold-glow'){`,
              `        const goldGradient = ctx.createLinearGradient(-90, 150, 90, -240);`,
              `        goldGradient.addColorStop(0, 'rgba(255, 178, 36, 0.96)');`,
              `        goldGradient.addColorStop(0.36, 'rgba(255, 236, 156, 1)');`,
              `        goldGradient.addColorStop(0.68, 'rgba(255, 205, 72, 0.98)');`,
              `        goldGradient.addColorStop(1, 'rgba(255, 149, 0, 0.92)');`,
              `        ctx.strokeStyle = goldGradient;`,
              `        ctx.lineWidth = 12;`,
              `        ctx.lineCap = 'round';`,
              `        ctx.lineJoin = 'round';`,
              `        ctx.shadowColor = 'rgba(255, 206, 87, 0.95)';`,
              `        ctx.shadowBlur = 24;`,
              `      }else{`,
              `        ctx.strokeStyle = strokeStyle;`,
              `        ctx.lineWidth = 10;`,
              `        ctx.shadowBlur = 0;`,
              `      }`
            ].join('\n');

            if (code.includes(originalStrokeCode)) {
              code = code.replace(originalStrokeCode, goldGlowStrokeCode);
            } else {
              throw new Error('无法定位 canvas 杆子样式代码');
            }

            return code;
          }

          function injectCharactersToLess(sourceCode, characters) {
            let code = sourceCode;

            if (characters.length > 0) {
              const bedIndex = code.indexOf('.sakana-bed');

              if (bedIndex === -1) {
                throw new Error('无法定位 html/sakana.less 中的 .sakana-bed');
              }

              const characterCloseIndex = code.lastIndexOf('}', bedIndex);

              if (characterCloseIndex === -1) {
                throw new Error('无法定位 html/sakana.less 中 .sakana-character 的结束位置');
              }

              const lessBlocks = characters.map((character) => {
                return [
                  `    &[data-character="${escapeLessString(character.name)}"]{`,
                  `      background-image: url("${escapeLessString(character.image)}");`,
                  `    }`
                ].join('\n');
              }).join('\n');

              code =
                code.slice(0, characterCloseIndex) +
                '\n' +
                lessBlocks +
                '\n' +
                code.slice(characterCloseIndex);
            }

            // 金黄色发光底座特效。
            code += `

          .sakana-box{
            .sakana-bed{
              background-image:
                url("blue00f4.png"),
                linear-gradient(90deg, rgba(255,179,38,.92), rgba(255,244,177,.98) 48%, rgba(255,188,43,.94));
              background-repeat: no-repeat, no-repeat;
              background-position: 50% 50%, 50% 50%;
              background-size: 20px 20px, 100% 100%;
              border-radius: 999px;
              box-shadow:
                0 0 0 1px rgba(255,236,161,.70),
                0 0 10px rgba(255,210,86,.72),
                0 0 26px rgba(255,181,36,.58),
                0 8px 22px rgba(139,92,0,.28),
                inset 0 1px 2px rgba(255,255,255,.72),
                inset 0 -2px 5px rgba(162,91,0,.30);
              overflow: hidden;
            }

            .sakana-bed::before{
              content: "";
              position: absolute;
              left: 10px;
              right: 10px;
              top: 3px;
              height: 5px;
              border-radius: 999px;
              background: linear-gradient(90deg, transparent, rgba(255,255,255,.82), transparent);
              pointer-events: none;
            }

            .sakana-bed::after{
              content: "";
              position: absolute;
              inset: -8px -18px;
              border-radius: 999px;
              background: radial-gradient(circle, rgba(255,213,96,.42), transparent 64%);
              filter: blur(6px);
              z-index: -1;
              pointer-events: none;
            }
          }
          `;

            return code;
          }

          async function compileLessToMinCss(lessCode) {
            const result = await less.render(lessCode, {
              paths: [htmlDir],
              filename: sakanaLessPath,
              compress: false,
              javascriptEnabled: false
            });

            const minified = new CleanCSS({
              report: 'min',
              sourceMap: false
            }).minify(result.css);

            if (minified.errors && minified.errors.length > 0) {
              throw new Error(`CSS 压缩失败:\n${minified.errors.join('\n')}`);
            }

            return minified.styles;
          }

          function getInlineAssetFileNames() {
            return getHtmlFiles()
              .filter((fileName) => {
                const ext = path.extname(fileName).toLowerCase();
                return Object.prototype.hasOwnProperty.call(assetMimeTypes, ext);
              })
              .sort((a, b) => b.length - a.length);
          }

          function inlineAssets(code) {
            const fileNames = getInlineAssetFileNames();

            if (fileNames.length === 0) {
              return code;
            }

            const assetRegExp = new RegExp(
              `(${fileNames.map(escapeRegExp).join('|')})`,
              'g'
            );

            return code.replace(assetRegExp, (fileName) => {
              const filePath = path.join(htmlDir, fileName);
              const base64 = fs.readFileSync(filePath).toString('base64');
              return `data:${getMimeType(fileName)};base64,${base64}`;
            });
          }

          async function main() {
            assertFileExists(sakanaJsPath);
            assertFileExists(sakanaLessPath);

            const customCharacters = getCustomCharacters();
            const defaultCharacter = getLatestDefaultCharacter(customCharacters);

            console.log('检测到自定义角色:');

            if (customCharacters.length === 0) {
              console.log('  无');
            } else {
              for (const character of customCharacters) {
                console.log(`  ${character.name} <= html/${character.image}, changedAt=${character.changedAt}`);
              }
            }

            console.log(`默认角色: ${defaultCharacter}`);

            const originalSakanaJs = fs.readFileSync(sakanaJsPath, 'utf8');
            const originalSakanaLess = fs.readFileSync(sakanaLessPath, 'utf8');

            const sakanaJsWithCharacters = injectCharactersToJs(
              originalSakanaJs,
              customCharacters,
              defaultCharacter
            );

            const sakanaLessWithCharacters = injectCharactersToLess(
              originalSakanaLess,
              customCharacters
            );

            const minCss = await compileLessToMinCss(sakanaLessWithCharacters);

            const jsWithCss = sakanaJsWithCharacters.replace(
              '/* css */',
              `const styleEl = document.createElement('style');styleEl.innerHTML=${JSON.stringify(minCss)};document.head.appendChild(styleEl);`
            );

            if (jsWithCss === sakanaJsWithCharacters) {
              throw new Error('CSS 注入失败，未找到 /* css */ 标记');
            }

            const minifiedJsResult = UglifyJS.minify(jsWithCss, uglifyOptions);

            if (minifiedJsResult.error) {
              throw minifiedJsResult.error;
            }

            let outputCode = minifiedJsResult.code;
            outputCode = inlineAssets(outputCode);

            fs.writeFileSync(sakanaMinJsPath, outputCode, 'utf8');

            const characterNames = customCharacters.map((item) => item.name).join(', ');

            fs.writeFileSync(
              '.sakana-characters.txt',
              characterNames || 'default-only',
              'utf8'
            );

            fs.writeFileSync(
              '.sakana-default-character.txt',
              defaultCharacter,
              'utf8'
            );

            fs.writeFileSync(
              '.sakana-build-summary.txt',
              [
                `Generated: html/sakana.min.js`,
                `Size: ${Buffer.byteLength(outputCode)} bytes`,
                `MD5: ${md5(outputCode)}`,
                `Default character: ${defaultCharacter}`,
                `Custom characters: ${characterNames || 'none'}`,
                `Golden glow rod: enabled`,
                `Golden glow bed: enabled`
              ].join('\n'),
              'utf8'
            );

            console.log('构建完成');
            console.log(fs.readFileSync('.sakana-build-summary.txt', 'utf8'));
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

          node .sakana-build-auto.cjs

      - name: Show build summary
        run: |
          cat .sakana-build-summary.txt
          ls -lh html/sakana.min.js

      - name: Commit generated sakana.min.js
        shell: bash
        run: |
          rm -f .sakana-build-auto.cjs .sakana-build-summary.txt

          if git diff --quiet -- html/sakana.min.js; then
            echo "html/sakana.min.js 没有变化，无需提交。"
            rm -f .sakana-characters.txt .sakana-default-character.txt
            exit 0
          fi

          CHARACTERS="$(cat .sakana-characters.txt 2>/dev/null || echo default-only)"
          DEFAULT_CHARACTER="$(cat .sakana-default-character.txt 2>/dev/null || echo takina)"

          rm -f .sakana-characters.txt .sakana-default-character.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add html/sakana.min.js
          git commit -m "build: update sakana.min.js default ${DEFAULT_CHARACTER} for ${CHARACTERS}"
          git push origin HEAD:${GITHUB_REF_NAME}
